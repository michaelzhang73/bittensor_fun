name: Submit to B12
on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run submission script
        run: python 2.py
